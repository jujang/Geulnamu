name: Backend Auto Build & Deploy

# 🎯 트리거 설정: dev 브랜치로의 push만 감지 (배포)
on:
  push:
    branches:
      - dev  # dev 브랜치로 PR merge 또는 직접 commit 시 배포
      # - prod  # 향후: prod 브랜치로 변경 시 주석 해제
    paths:
      - 'geulnamu_backend/src/**'                    # Java 소스 코드 + 리소스 파일
      - 'geulnamu_backend/build.gradle'              # 빌드 설정
      - 'geulnamu_backend/settings.gradle'           # 프로젝트 설정
      - 'geulnamu_backend/gradle.properties'         # Gradle 속성

# 🚀 빌드 및 배포 작업
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ 저장소 체크아웃
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # 2️⃣ JDK 17 설치
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'  # Gradle 의존성 캐싱
      
      # 3️⃣ Gradle 실행 권한 부여
      - name: 🔓 Grant execute permission for gradlew
        working-directory: geulnamu_backend
        run: chmod +x gradlew
      
      # 4️⃣ Gradle 빌드 (테스트 포함)
      - name: 🔨 Build with Gradle
        working-directory: geulnamu_backend
        env:
          SPRING_PROFILES_ACTIVE: test  # 테스트 프로필 사용
        run: |
          echo "🔨 Gradle 빌드 시작..."
          ./gradlew clean build
          echo "✅ 빌드 완료!"
      
      # 5️⃣ 빌드 결과물 확인
      - name: 📦 Verify JAR file
        working-directory: geulnamu_backend
        run: |
          echo "📦 빌드된 JAR 파일 확인..."
          ls -lh build/libs/
          
          if [ -f "build/libs/geulnamu-0.0.1-SNAPSHOT.jar" ]; then
            echo "✅ JAR 파일 생성 성공!"
            echo "📊 파일 크기: $(du -h build/libs/geulnamu-0.0.1-SNAPSHOT.jar | cut -f1)"
          else
            echo "❌ JAR 파일이 생성되지 않았습니다!"
            exit 1
          fi
      
      # 6️⃣ SSH 키 설정
      - name: 🔐 Setup SSH Key
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          echo "🔐 SSH 키 설정 중..."
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          
          # known_hosts에 서버 추가 (SSH 핑거프린트 확인 스킵)
          ssh-keyscan -H $ORACLE_HOST >> ~/.ssh/known_hosts
          
          echo "✅ SSH 키 설정 완료!"
      
      # 7️⃣ 서버에 배포 스크립트 전송
      - name: 📤 Upload deploy script to server
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
        run: |
          echo "📤 배포 스크립트 전송 중..."
          
          # 배포 스크립트 전송
          scp -i ~/.ssh/oracle_key -P $ORACLE_PORT -o StrictHostKeyChecking=no \
            .github/scripts/deploy.sh $ORACLE_USER@$ORACLE_HOST:$ORACLE_DEPLOY_PATH/
          
          echo "✅ 배포 스크립트 전송 완료!"
      
      # 8️⃣ JAR 파일을 서버로 전송 및 무결성 검증
      - name: 📤 Upload JAR to Oracle Cloud
        working-directory: geulnamu_backend
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
        run: |
          echo "📤 JAR 파일 전송 시작..."
          
          # 1️⃣ 로컬 JAR 파일의 MD5 체크섬 계산
          echo "📊 로컬 JAR 파일 체크섬 계산 중..."
          LOCAL_MD5=$(md5sum build/libs/geulnamu-0.0.1-SNAPSHOT.jar | awk '{print $1}')
          echo "📊 로컬 JAR MD5: $LOCAL_MD5"
          
          # 2️⃣ JAR 파일 전송
          echo "🚀 JAR 파일 전송 중..."
          scp -i ~/.ssh/oracle_key -P $ORACLE_PORT -o StrictHostKeyChecking=no \
            build/libs/geulnamu-0.0.1-SNAPSHOT.jar \
            $ORACLE_USER@$ORACLE_HOST:$ORACLE_DEPLOY_PATH/
          echo "✅ JAR 파일 전송 완료!"
          
          # 3️⃣ 서버의 JAR 파일 MD5 체크섬 계산
          echo "📊 서버 JAR 파일 체크섬 확인 중..."
          REMOTE_MD5=$(ssh -i ~/.ssh/oracle_key -p $ORACLE_PORT -o StrictHostKeyChecking=no \
            $ORACLE_USER@$ORACLE_HOST \
            "md5sum $ORACLE_DEPLOY_PATH/geulnamu-0.0.1-SNAPSHOT.jar | awk '{print \$1}'")
          echo "📊 서버 JAR MD5: $REMOTE_MD5"
          
          # 4️⃣ 무결성 검증
          echo "🔍 무결성 검증 중..."
          if [ "$LOCAL_MD5" != "$REMOTE_MD5" ]; then
            echo "❌ ============================================"
            echo "❌ JAR 파일 전송 실패!"
            echo "❌ 로컬 MD5:  $LOCAL_MD5"
            echo "❌ 서버 MD5:  $REMOTE_MD5"
            echo "❌ 체크섬이 일치하지 않습니다."
            echo "❌ 배포를 중단합니다."
            echo "❌ ============================================"
            exit 1
          fi
          
          echo "✅ ============================================"
          echo "✅ JAR 파일 무결성 확인 완료!"
          echo "✅ 체크섬: $LOCAL_MD5"
          echo "✅ 파일이 정상적으로 전송되었습니다."
          echo "✅ ============================================"
      
      # 9️⃣ 서버에서 배포 스크립트 실행
      - name: 🚀 Execute deploy script on server
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
        run: |
          echo "🚀 서버에서 배포 스크립트 실행 중..."
          
          ssh -i ~/.ssh/oracle_key -p $ORACLE_PORT -o StrictHostKeyChecking=no \
            $ORACLE_USER@$ORACLE_HOST \
            "chmod +x $ORACLE_DEPLOY_PATH/deploy.sh && $ORACLE_DEPLOY_PATH/deploy.sh $ORACLE_DEPLOY_PATH"
          
          echo "✅ 배포 스크립트 실행 완료!"
      
      # 🔟 배포 결과 요약
      - name: 📊 Deploy Summary
        if: success()
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          echo "🎉 ============================================"
          echo "✅ Backend 자동 빌드 및 배포가 완료되었습니다!"
          echo "📦 빌드 브랜치: ${{ github.ref_name }}"
          echo "🔨 빌드 커밋: ${{ github.sha }}"
          echo "📂 JAR 파일: geulnamu-0.0.1-SNAPSHOT.jar"
          echo "🌐 배포 서버: $ORACLE_HOST"
          echo "🔧 프로파일: prod"
          echo "============================================ 🎉"
      
      # ❌ 배포 실패 시 정보 출력
      - name: ❌ Deploy Failed
        if: failure()
        run: |
          echo "❌ ============================================"
          echo "⚠️ Backend 배포에 실패했습니다!"
          echo "📦 실패한 브랜치: ${{ github.ref_name }}"
          echo "🔨 실패한 커밋: ${{ github.sha }}"
          echo "💡 GitHub Actions 로그를 확인하세요."
          echo "============================================ ❌"
