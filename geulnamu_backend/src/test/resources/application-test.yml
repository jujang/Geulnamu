# ==========================================
# 테스트 환경 설정 (GitHub Actions CI/CD)
# ==========================================

spring:
  application:
    name: geulnamu-api-test
  
  # H2 In-Memory Database 설정
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000
  
  # H2 Console (테스트 디버깅용)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # 테스트 시작/종료 시 자동 생성/삭제
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
    open-in-view: false
    show-sql: true
  
  # Redis 비활성화 (테스트에서는 캐시 불필요)
  cache:
    type: none
  
  # JWT 설정 (테스트용 더미 값)
  jwt:
    accessTokenKey: ${JWT_ACCESS_TOKEN_KEY:test-access-token-key-for-github-actions-minimum-32-characters-required}
    refreshTokenKey: ${JWT_REFRESH_TOKEN_KEY:test-refresh-token-key-for-github-actions-minimum-32-characters-required}
  
  # OAuth2 설정 (테스트용 더미 값)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:test-kakao-client-id-dummy}

# Firebase 설정 (테스트에서는 모킹 사용, 파일 불필요)
firebase:
  credentials:
    path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-dummy.json}

# Slack 웹훅 (테스트에서는 비활성화)
slack:
  webhook-url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/TEST/DUMMY/WEBHOOK}

# 서버 설정
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 로깅 설정 (테스트 중 로그 최소화)
logging:
  level:
    root: WARN
    com.geulnamu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 디버그 모드
debug:
  mode: true
