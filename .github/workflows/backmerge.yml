# .github/workflows/backmerge.yml
name: Back-merge prod into dev

# prod 브랜치에 새 병합(merge)이 있을 때마다 동작
on:
  pull_request:
    types: [closed]
    branches: [prod]

jobs:
  backmerge:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prod branch
        uses: actions/checkout@v3
        with:
          # prod 브랜치 전체 이력과 함께 가져오기
          fetch-depth: 0
          ref: prod

      - name: Create Back-merge Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          # 자동 생성될 PR의 베이스와 헤드        
          base: dev
          branch: backmerge-prod-into-dev    # PR용 브랜치 이름
          title: '🔄 Back-merge prod into dev'
          body: |
            자동으로 `prod`의 최신 변경사항을 `dev`에 반영하기 위한 PR입니다.
          commit-message: 'chore: back-merge prod into dev'
          labels: back-merge
          delete-branch: false