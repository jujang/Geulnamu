spring:
  datasource:
    url: jdbc:mysql://localhost:3306/geulnamu_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_SERVER_PASSWORD} # 여기에 실제 설정한 MySQL 비밀번호 입력

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      # 스키마 생성·변경 전략(create, create-drop, update, validate 등)
      ddl-auto: validate  # 이미 테이블이 생성되어 있으므로 validate 사용
    show-sql: false
    properties:
      hibernate.format_sql: true

# (선택) 콘솔 접속 보안·Actuator 연동
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: DEBUG