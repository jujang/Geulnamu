<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">


<style>
    /* 기본 폰트 설정 */
    body, .body, #content, #header, #toc, #toctitle,
    h1, h2, h3, h4, h5, h6,
    p, td, th, li, dt, dd,
    .title, .paragraph, .listingblock,
    code, pre, .literal {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }

    /* 제목 스타일 개선 */
    h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        letter-spacing: -0.02em;
    }

    /* 본문 가독성 향상 */
    #content {
        font-size: 16px;
        line-height: 1.7;
        color: #333;
    }

    /* 코드 블록 폰트 */
    code, pre, .listingblock code {
        font-family: 'Pretendard', 'D2Coding', 'Consolas', monospace !important;
        font-size: 14px;
    }

    /* 테이블 스타일 개선 */
    table.tableblock {
        font-size: 15px;
    }

    /* 링크 스타일 */
    a {
        color: #7DD3C0;
    }

    a:hover {
        color: #5BB5A3;
    }

    /* TOC(목차) 스타일 */
    #toc {
        font-size: 14px;
    }

    #toctitle {
        font-weight: 700;
        font-size: 18px;
    }
</style>
