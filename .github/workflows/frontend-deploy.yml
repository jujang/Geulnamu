name: Frontend Auto Build & Deploy

# 🎯 트리거 설정
on:
  push:
    branches:
      - dev  # 현재: dev 브랜치로 merge 시 배포
      # - prod  # 향후: prod 브랜치로 변경 시 주석 해제
    paths:
      - 'geulnamu_frontend/lib/**'           # Flutter 소스 코드
      - 'geulnamu_frontend/web/**'           # 웹 설정 파일
      - 'geulnamu_frontend/pubspec.yaml'     # 의존성 변경
      - 'geulnamu_frontend/pubspec.lock'     # 의존성 잠금 파일
      - 'geulnamu_frontend/.env.prod'        # 프로덕션 환경 변수

# 🚀 빌드 및 배포 작업
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ 저장소 체크아웃
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # 2️⃣ Flutter 설치
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'  # Dart 3.8.1 포함 (pubspec.yaml 요구사항 충족)
          channel: 'stable'
          cache: true  # 빌드 속도 향상을 위한 캐시
      
      # 3️⃣ Flutter 의존성 설치
      - name: 📦 Install dependencies
        working-directory: geulnamu_frontend
        run: flutter pub get
      
      # 4️⃣ Flutter 웹 빌드
      - name: 🔨 Build Flutter Web
        working-directory: geulnamu_frontend
        run: |
          echo "🔨 Flutter 웹 빌드 시작..."
          flutter build web --release
          echo "✅ 빌드 완료!"
      
      # 5️⃣ 빌드 결과물을 dist 폴더로 복사
      - name: 📂 Copy build to dist
        working-directory: geulnamu_frontend
        run: |
          echo "📂 빌드 결과물을 dist 폴더로 복사 중..."
          
          # dist 폴더가 없으면 생성
          mkdir -p dist
          
          # 기존 dist 내용 삭제 (새로운 빌드로 완전 교체)
          rm -rf dist/*
          
          # build/web 내용을 dist로 복사
          cp -r build/web/* dist/
          
          # vercel.json 복사 (SPA 라우팅 설정)
          cp vercel.json dist/
          
          echo "✅ 복사 완료!"
          echo "📊 dist 폴더 내용:"
          ls -la dist/
      
      # 6️⃣ Vercel CLI 설치
      - name: 🔧 Install Vercel CLI
        run: npm install --global vercel@latest
      
      # 7️⃣ Vercel에 직접 배포
      - name: 🚀 Deploy to Vercel
        working-directory: geulnamu_frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "🚀 Vercel 배포 시작..."
          
          # Vercel 배포 (프로덕션)
          vercel deploy --prod --token=$VERCEL_TOKEN \
            --cwd dist \
            --yes
          
          echo "✅ Vercel 배포 완료!"
      
      # 8️⃣ 배포 결과 요약
      - name: 📊 Deploy Summary
        if: success()
        run: |
          echo "🎉 ============================================"
          echo "✅ Frontend 자동 빌드 및 배포가 완료되었습니다!"
          echo "📦 빌드 브랜치: ${{ github.ref_name }}"
          echo "🔨 빌드 커밋: ${{ github.sha }}"
          echo "📂 배포 폴더: geulnamu_frontend/dist/"
          echo "🌐 Vercel 프로덕션 배포 완료"
          echo "============================================ 🎉"
